<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CGN Archive Article</title><meta name="description" content="Read an archived CGN News article from the live Archives sheet."><link rel="canonical" href="https://archives.cgnnews.net/"><link rel="icon" href="https://www.cgnnews.net/favicon.ico" sizes="any"><meta name="robots" content="index, follow, max-image-preview:large"><link rel="stylesheet" href="/assets/archive.css"><style>.archive-article-page{max-width:960px}.archive-story{background:#fff;border:1px solid var(--line);box-shadow:0 18px 42px rgba(7,23,47,.12);padding:clamp(20px,4vw,44px)}.archive-story h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(34px,5.4vw,64px);line-height:1.02;margin:8px 0 12px;letter-spacing:-.035em}.archive-subtitle{font-size:20px;line-height:1.45;color:#475467}.archive-hero-image img{width:100%;max-height:520px;object-fit:cover;background:#07172f}.archive-hero-image figcaption{font-size:12px;color:#667085;margin-top:6px}.archive-body,.archive-analysis{font-size:18px;line-height:1.72}.archive-body p,.archive-analysis p{margin:0 0 18px}.archive-analysis{border-top:1px solid var(--line);margin-top:28px;padding-top:20px}.archive-analysis h2{font-family:Georgia,"Times New Roman",serif}.archive-backlink a{font-weight:900;color:#07172f}</style></head><body><div id="cgn-site-header"></div><main class="archive-shell archive-article-page"><div id="archiveArticle"><div class="archive-empty">Loading archived article from the live Archives sheet...</div></div></main><div id="cgn-site-footer"></div><script src="/assets/cgn-shell.js"></script><script>
const CGN_ARCHIVE_API = "https://script.google.com/macros/s/AKfycbx41mQg-Ine3XZ-VrMI_SaQn4_K6cDQHA0cBFyGPgupu_edNFoNRjSLv2hoSe_bOytt/exec";
function safeText(value){ return String(value || "").replace(/[&<>\"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c])); }
function monthName(month){ const index = Math.max(0, Math.min(11, Number(month || 1) - 1)); return ["January","February","March","April","May","June","July","August","September","October","November","December"][index]; }
function visibleDate(raw){ const d = new Date(raw || ""); if(isNaN(d.getTime())) return ""; return d.getUTCDate() + " " + monthName(d.getUTCMonth()+1) + " " + d.getUTCFullYear(); }
function currentSlug(){ const parts = location.pathname.split("/").filter(Boolean); return parts[parts.length - 1] || ""; }
function apiUrl(action, params){ const url = new URL(CGN_ARCHIVE_API); url.searchParams.set("action", action); Object.keys(params || {}).forEach(k => { if(params[k]) url.searchParams.set(k, params[k]); }); return url.toString(); }
function loadJsonp(action, params){ return new Promise((resolve,reject)=>{ const cb="cgnArchiveArticleCb_"+Date.now()+"_"+Math.random().toString(36).slice(2); const script=document.createElement("script"); const url=new URL(CGN_ARCHIVE_API); url.searchParams.set("action",action); Object.keys(params||{}).forEach(k=>{ if(params[k]) url.searchParams.set(k,params[k]); }); url.searchParams.set("callback",cb); window[cb]=data=>{ cleanup(); resolve(data); }; function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode)script.parentNode.removeChild(script); } script.onerror=()=>{cleanup(); reject(new Error("Archive API JSONP load failed."));}; script.src=url.toString(); document.head.appendChild(script); }); }
async function loadApi(action, params){ try{ const res=await fetch(apiUrl(action,params),{cache:"no-store"}); if(!res.ok) throw new Error("HTTP "+res.status); return await res.json(); }catch(err){ return loadJsonp(action,params); } }
function renderArticle(article){ const image=article.hero_image_url||article.image||"/news/CGNNewsDesk01.png"; const body=article.body_html||"<p>This archived article body is not available.</p>"; const what=article.what_this_means||article.analysis||""; document.title=(article.seo_title||article.title||"CGN News Archive")+" | CGN Archives"; const desc=document.querySelector('meta[name="description"]'); if(desc) desc.setAttribute("content", article.seo_description||article.summary||article.subtitle||""); const canonical=document.querySelector('link[rel="canonical"]'); if(canonical) canonical.setAttribute("href", article.canonical_url||article.archive_url||location.href); document.getElementById("archiveArticle").innerHTML=`<article class="archive-story"><div class="archive-kicker">${safeText(article.category||"News")}</div><h1>${safeText(article.title||"Untitled")}</h1>${article.subtitle?`<p class="archive-subtitle">${safeText(article.subtitle)}</p>`:""}<div class="archive-meta">By ${safeText(article.author||"CGN News")} · ${safeText(visibleDate(article.published_at||article.updated_at))}</div><figure class="archive-hero-image"><img src="${safeText(image)}" alt="${safeText(article.title||"CGN News archive")}"><figcaption>${safeText(article.image_credit||article.credit||"CGN News")}</figcaption></figure><section class="archive-body">${body}</section>${what?`<section class="archive-analysis"><h2>What this means</h2>${what}</section>`:""}<p class="archive-backlink"><a href="/">Back to CGN Archives</a></p></article>`; }
async function initArticle(){ const mount=document.getElementById("archiveArticle"); const slug=currentSlug(); if(!slug){ location.replace("/"); return; } try{ const data=await loadApi("archive_live_article",{ slug:slug, path:location.pathname }); if(!data || data.success===false || !data.article) throw new Error((data&&data.error)||"Archive article not found."); renderArticle(data.article); }catch(err){ mount.innerHTML=`<div class="archive-empty"><h1>Archive article not found</h1><p>${safeText(err.message||err)}</p><p><a href="/">Back to CGN Archives</a></p></div>`; } }
initArticle();
</script></body></html>
